# alternatives/simple-http-proxy/ Squid forward proxy
#
# 2 段の独立した security boundary を持つ:
#   1. CONNECT 行 (平文 hostname)   → http_access で dstdomain 検査
#      → destination IP を allowlist host のものに固定する。攻撃者制御 host
#        への CONNECT を CONNECT 段階で 403 で弾く
#   2. TLS ClientHello SNI         → ssl_bump で ssl::server_name 検査
#      → allowlist host の IP に届いた後、SNI で同一 CDN 上の attacker tenant
#        に飛ぶ CONNECT 詐称 (CDN tenant pivoting) を terminate で弾く
# 両層は独立した防御層で、片方を欠くと他方が塞ぐ攻撃面が漏れる (詳細は README)。
#
# TLS 復号は一切行わない (splice = 透過 forward) ため、workspace 側への
# 独自 CA 配布は不要。Dockerfile で生成した内部用 CA は ssl_bump モード
# 起動時の cert= 引数を満たすための体裁で、実際に提示されない。
#
# allowlist の host list は allowed-hosts.txt に外部化し、dstdomain と
# ssl::server_name の両方から参照する (単一ソース)。

access_log none
visible_hostname simple-http-proxy

# ssl_bump モードで listen。splice-only 構成だが cert= / key= は必須。
http_port 3128 ssl-bump \
    cert=/etc/squid/ssl_cert/squid-ca.crt \
    key=/etc/squid/ssl_cert/squid-ca.key \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=4MB

sslcrtd_program /usr/lib/squid/security_file_certgen \
    -s /var/spool/squid/ssl_db -M 4MB
sslcrtd_children 5

# --- allowlist (host list は allowed-hosts.txt から単一ソース) ---
# CONNECT host / HTTP Host (plain HTTP) の一次フィルタ。
acl allowed_dst dstdomain "/etc/squid/allowed-hosts.txt"
# TLS ClientHello SNI の二次フィルタ。
# --client-requested で「クライアントが ClientHello で送ってきた SNI 値のみ」
# に判定根拠を限定する (default の ssl::server_name は CONNECT URI / SNI /
# server cert subject の OR で match するため、知らないうちに CONNECT URI と
# match して dstdomain と機能重複し SNI 防御層が無力化される落とし穴を避ける)。
acl allowed_sni ssl::server_name --client-requested "/etc/squid/allowed-hosts.txt"

acl step1 at_step SslBump1

# --- safety (Squid 標準) ---
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_dst
http_access deny all

# ClientHello を peek して SNI を取り出し、allowlist にマッチしたら splice
# (TLS 復号せず透過 forward)、マッチしなければ terminate (TCP 切断)。
ssl_bump peek step1
ssl_bump splice allowed_sni
ssl_bump terminate all

cache deny all
