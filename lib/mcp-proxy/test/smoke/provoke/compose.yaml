services:
  provoke-proxy:
    image: mcp-proxy:dev
    build:
      context: ../../..
    entrypoint:
      - node
      - src/index.ts
      - --listen
      - 0.0.0.0:8000
      - provoker
      - --
      - node
      - /app/test/smoke/provoke/provoke-mcp.ts

  provoke-smoke:
    image: mcp-proxy:dev
    entrypoint: ["node", "--test", "test/smoke/provoke/smoke.test.ts"]
    environment:
      PROXY_URL: http://provoke-proxy:8000/mcp
    depends_on:
      - provoke-proxy
