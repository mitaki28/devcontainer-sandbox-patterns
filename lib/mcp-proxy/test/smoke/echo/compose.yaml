services:
  proxy:
    build:
      context: ../../..
    image: mcp-proxy:dev
    # ホストから手動で curl 等で叩くための公開（smoke 自体には不要）。
    ports:
      - "127.0.0.1:8800:8000"
    command:
      - --listen
      - 0.0.0.0:8000
      - --token
      - testtoken
      - echo
      - --
      - bun
      - run
      - /app/test/mocks/echo-mcp.ts

  proxy-binary:
    build:
      context: ../../..
      dockerfile: Dockerfile.binary
    image: mcp-proxy:bin
    # こちらも任意で手動デバッグ用。
    ports:
      - "127.0.0.1:8801:8000"
    command:
      - --listen
      - 0.0.0.0:8000
      - --token
      - testtoken
      - echo
      - --
      - /usr/local/bin/echo-mcp

  smoke:
    image: mcp-proxy:dev
    entrypoint: ["bun", "test", "test/smoke/echo/smoke.test.ts"]
    environment:
      PROXY_URL: http://proxy:8000/mcp
      PROXY_TOKEN: testtoken
    depends_on:
      - proxy

  binary-smoke:
    image: mcp-proxy:dev
    entrypoint: ["bun", "test", "test/smoke/echo/smoke.test.ts"]
    environment:
      PROXY_URL: http://proxy-binary:8000/mcp
      PROXY_TOKEN: testtoken
    depends_on:
      - proxy-binary
