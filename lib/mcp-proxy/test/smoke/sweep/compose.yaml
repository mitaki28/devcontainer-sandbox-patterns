services:
  sweep-proxy:
    image: mcp-proxy:dev
    build:
      context: ../../..
    entrypoint:
      - node
      - src/index.ts
      - --listen
      - 0.0.0.0:8000
      - --session-idle-timeout
      - "2000"
      - echo
      - --
      - node
      - /app/test/mocks/echo-mcp.ts

  sweep-smoke:
    image: mcp-proxy:dev
    entrypoint: ["node", "--test", "test/smoke/sweep/smoke.test.ts"]
    environment:
      PROXY_URL: http://sweep-proxy:8000/mcp
    depends_on:
      - sweep-proxy
